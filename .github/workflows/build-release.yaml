name: "\U0001F680 Build & Release"

on:
  workflow_dispatch:
    inputs:
      version-override:
        description: 'Force a specific release version (e.g. v1.0.0). Leave blank to auto-compute from commit history.'
        required: false
        default: ''
  push:
    branches:
      - "main"
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: michaeltrip/velero-backup-reporter
  GO_VERSION: "1.25"
  NODE_VERSION: "22"

jobs:
  # Determine version tag based on git tags and branch
  determine-tag:
    runs-on: ubuntu-latest
    outputs:
      docker-tag: ${{ steps.tag.outputs.docker-tag }}
      git-tag: ${{ steps.tag.outputs.git-tag }}
      is-main: ${{ steps.tag.outputs.is-main }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          set -e

          VERSION_OVERRIDE="${{ github.event.inputs.version-override }}"

          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IS_MAIN="true"

            if [ -n "$VERSION_OVERRIDE" ]; then
              echo "⚠️  Version override: $VERSION_OVERRIDE"
              DOCKER_TAG="$VERSION_OVERRIDE"
              GIT_TAG="$VERSION_OVERRIDE"
            else
              # Get the latest git tag, or default to v0.0.0
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
              echo "Latest git tag: $LATEST_TAG"

              # Extract version numbers (remove 'v' prefix)
              VERSION=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

              MAJOR=${MAJOR:-0}
              MINOR=${MINOR:-0}
              PATCH=${PATCH:-0}

              # Analyze commit messages since last tag to determine bump type
              if [ "$LATEST_TAG" != "v0.0.0" ]; then
                COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s")
              else
                COMMITS=$(git log --pretty=format:"%s")
              fi

              if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|major:"; then
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                BUMP_TYPE="major"
              elif echo "$COMMITS" | grep -qiE "^feat|^feature|minor:"; then
                MINOR=$((MINOR + 1))
                PATCH=0
                BUMP_TYPE="minor"
              else
                PATCH=$((PATCH + 1))
                BUMP_TYPE="patch"
              fi

              NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
              echo "Bump type: $BUMP_TYPE"
              echo "New tag: $NEW_TAG"

              DOCKER_TAG="$NEW_TAG"
              GIT_TAG="$NEW_TAG"
            fi
          else
            IS_MAIN="false"

            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

            DOCKER_TAG="${BRANCH_NAME}-${SHORT_SHA}"
            GIT_TAG=""
          fi

          echo "Docker tag: $DOCKER_TAG"
          echo "Is main branch: $IS_MAIN"

          echo "docker-tag=$DOCKER_TAG" >> $GITHUB_OUTPUT
          echo "git-tag=$GIT_TAG" >> $GITHUB_OUTPUT
          echo "is-main=$IS_MAIN" >> $GITHUB_OUTPUT

  # Run Go tests, vet, and frontend build check
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Build frontend
        run: cd web/frontend && npm ci && npm run build

      - name: Verify Go modules
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -count=1

  # Build and push the container image
  build-container:
    runs-on: ubuntu-latest
    needs: [determine-tag, test]
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ needs.determine-tag.outputs.is-main == 'true' }}
            type=raw,value=${{ needs.determine-tag.outputs.docker-tag }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=velero-backup-reporter
            org.opencontainers.image.description=Backup report generator and web UI for Velero
            org.opencontainers.image.vendor=MichaelTrip

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.determine-tag.outputs.docker-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create and push a git tag on main branch
  create-git-tag:
    runs-on: ubuntu-latest
    needs: [determine-tag, build-container]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push git tag
        run: |
          GIT_TAG="${{ needs.determine-tag.outputs.git-tag }}"
          if [ -z "$GIT_TAG" ]; then
            echo "No git tag to create."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$GIT_TAG" >/dev/null 2>&1; then
            echo "Tag $GIT_TAG already exists, skipping."
          else
            git tag "$GIT_TAG"
            git push origin "$GIT_TAG"
            echo "✅ Created and pushed tag: $GIT_TAG"
          fi

  # Create a GitHub Release on main branch
  create-github-release:
    runs-on: ubuntu-latest
    needs: [determine-tag, build-container, create-git-tag]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          LATEST_TAG="${{ needs.determine-tag.outputs.git-tag }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-tag.outputs.git-tag }}
          name: Release ${{ needs.determine-tag.outputs.git-tag }}
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Package and publish Helm chart to GHCR OCI registry
  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: [determine-tag, build-container]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Sync chart version with application tag
        run: |
          APP_TAG="${{ needs.determine-tag.outputs.docker-tag }}"
          echo "🔖 Setting chart version and appVersion to: ${APP_TAG}"

          sed -i "s/^version:.*/version: ${APP_TAG}/" charts/velero-backup-reporter/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${APP_TAG}\"/" charts/velero-backup-reporter/Chart.yaml

          echo "Updated Chart.yaml:"
          grep -E "^(version|appVersion):" charts/velero-backup-reporter/Chart.yaml

      - name: Commit chart version update
        run: |
          if git diff --quiet charts/velero-backup-reporter/Chart.yaml; then
            echo "Chart.yaml already has the expected version"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add charts/velero-backup-reporter/Chart.yaml
          git commit -m "chore(helm): sync chart version to ${{ needs.determine-tag.outputs.docker-tag }} [skip ci]

          Auto-generated from workflow run: ${{ github.run_id }}"
          git push origin main

      - name: Log in to GHCR for Helm push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package charts/velero-backup-reporter --destination .helm-packages

      - name: Publish Helm chart to OCI repo
        run: |
          helm push .helm-packages/velero-backup-reporter-${{ needs.determine-tag.outputs.docker-tag }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Add Helm publish summary
        run: |
          echo "## ⛵ Helm Chart Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Chart:** \\`velero-backup-reporter\\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \\`${{ needs.determine-tag.outputs.docker-tag }}\\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \\`${{ env.REGISTRY }}/${{ github.repository_owner }}/charts\\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\\`\\`\\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm pull oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/velero-backup-reporter --version ${{ needs.determine-tag.outputs.docker-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\\`\\`\\`" >> $GITHUB_STEP_SUMMARY

  # Update deployment manifest with latest image tag on main
  update-deployment:
    runs-on: ubuntu-latest
    needs: [determine-tag, build-container]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update deployment manifest with new image tag
        run: |
          echo "🔄 Updating deploy/manifests.yaml to use new image tag..."

          NEW_IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.determine-tag.outputs.docker-tag }}"
          sed -i "s|image: .*velero-backup-reporter:.*|image: ${NEW_IMAGE}|g" deploy/manifests.yaml

          if git diff --quiet; then
            echo "✅ Deployment file is already up to date"
            exit 0
          fi

          echo "📝 Deployment file updated, committing changes..."

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/manifests.yaml
          git commit -m "chore: update deployment image to ${{ needs.determine-tag.outputs.docker-tag }} [skip ci]

          Auto-generated from workflow run: ${{ github.run_id }}"
          git push origin main

  # Print a build summary
  build-summary:
    runs-on: ubuntu-latest
    needs: [determine-tag, build-container]
    if: always() && needs.build-container.result == 'success'
    permissions:
      contents: read

    steps:
      - name: Generate Build Summary
        run: |
          echo "# 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.build-container.outputs.image-tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ needs.build-container.outputs.image-digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🏷️ Tag Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Tag:** \`${{ needs.determine-tag.outputs.docker-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Git Tag:** \`${{ needs.determine-tag.outputs.git-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Is Main Branch:** \`${{ needs.determine-tag.outputs.is-main }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Event Type:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "## 🚢 Pull Command" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.determine-tag.outputs.docker-tag }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
