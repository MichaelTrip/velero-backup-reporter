replicaCount: 1

image:
  repository: ghcr.io/michaeltrip/velero-backup-reporter
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# Application configuration
config:
  namespace: velero
  port: 8080
  collectionInterval: "5m"

# Email configuration
email:
  enabled: false
  testEnabled: false
  schedule: "0 8 * * *"
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
    to: []
    tls: true
  # Use an existing secret for SMTP credentials
  # The secret should contain keys: smtp-username, smtp-password
  existingSecret: ""
