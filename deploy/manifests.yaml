---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero-backup-reporter
  namespace: velero
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero-backup-reporter
rules:
  - apiGroups: ["velero.io"]
    resources: ["backups", "schedules", "podvolumebackups"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["velero.io"]
    resources: ["downloadrequests"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-backup-reporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velero-backup-reporter
subjects:
  - kind: ServiceAccount
    name: velero-backup-reporter
    namespace: velero
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero-backup-reporter
  namespace: velero
  labels:
    app: velero-backup-reporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: velero-backup-reporter
  template:
    metadata:
      labels:
        app: velero-backup-reporter
    spec:
      serviceAccountName: velero-backup-reporter
      containers:
        - name: velero-backup-reporter
          image: ghcr.io/michaeltrip/velero-backup-reporter:v0.1.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NAMESPACE
              value: "velero"
            - name: PORT
              value: "8080"
            - name: COLLECTION_INTERVAL
              value: "5m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: velero-backup-reporter
  namespace: velero
  labels:
    app: velero-backup-reporter
spec:
  selector:
    app: velero-backup-reporter
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
